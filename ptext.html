<h1>Enter Paragraph Text:</h1>
<input type="text" id="input2" placeholder="Paragraph text...">
<button onclick="saveTwo()" class="blue-button">Generate Code</button>
<style>
    body {
  background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
  background-size: 400% 400%;
  animation: gradientShift 15s ease infinite;
  height: 100vh;
}

@keyframes gradientShift {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}
    .blue-button {
  background-color: #007bff; /* Primary blue color */
  border: none;
  color: white;
  padding: 10px 20px;
  text-align: center;
  text-decoration: none;
  display: inline-block;
  font-size: 16px;
  margin: 4px 2px;
  cursor: pointer;
  border-radius: 8px; /* Control roundness here */
  transition: background-color 0.3s ease;
}

.blue-button:hover {
  background-color: #0056b3; /* Darker blue on hover */
}

</style>
<script>
    function saveTwo() {
        const val = document.getElementById('input2').value;
        localStorage.setItem('secondItem', val);
        window.location.href = 'finish.html';
    }
</script>
